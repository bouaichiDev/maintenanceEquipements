spring.application.name=spring-jwt-api
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/maintenance_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:MySuperSecretKeyForJwtAuthentication123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${APP_UPLOAD_DIR:uploads}

springdoc.swagger-ui.path=/swagger-ui.html

server.port=8081